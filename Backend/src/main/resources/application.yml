server:
  port: 8080

spring:
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB
  datasource:
    # 腾讯云 MySQL（默认内网地址，与 CVM 同 VPC 时使用）；账号密码通过环境变量或 application-local.yml 配置
    url: jdbc:mysql://${DB_HOST:172.27.0.14}:${DB_PORT:3306}/${DB_NAME:pixel_craft_forge}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

seedream:
  api:
    url: https://ark.cn-beijing.volces.com/api/v3/images/generations
    key: ${SEEDREAM_API_KEY:your-api-key-placeholder}
  model:
    id: doubao-seedream-5-0-260128

seedance:
  api:
    base-url: https://ark.cn-beijing.volces.com/api/v3
    key: ${SEEDREAM_API_KEY:your-api-key-placeholder}
  model:
    id: doubao-seedance-1-5-pro-251215
  generate-audio: true
  poll:
    interval-ms: 10000
    max-attempts: 120

app:
  storage:
    type: local
  upload:
    base-dir: ./uploads
    elements-dir: elements
    references-dir: references
    videos-dir: videos
  oss:
    endpoint: oss-cn-beijing.aliyuncs.com
    access-key-id: ${OSS_ACCESS_KEY_ID:}
    access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
    bucket: ${OSS_BUCKET:}
    public-base-url: ${OSS_PUBLIC_BASE_URL:}

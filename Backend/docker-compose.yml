services:
  mysql:
    image: mysql:8.0
    container_name: pixel-craft-forge-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: pixelcraft
      MYSQL_DATABASE: pixel_craft_forge
      MYSQL_USER: pixelcraft
      MYSQL_PASSWORD: pixelcraft
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-ppixelcraft"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
